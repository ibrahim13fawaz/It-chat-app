
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT CHAT ULTIMATE</title>

<style>
body{margin:0;font-family:Arial;background:#070713;color:#fff}
.hidden{display:none}
.center{display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#15152a;padding:20px;border-radius:12px;width:90%;max-width:360px}
input{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px}
button{width:100%;padding:10px;margin-top:5px;border:none;border-radius:8px;background:#6366f1;color:#fff}
.top{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;padding:10px;background:#111;z-index:10}
.room{padding:10px;margin:5px;background:#1f1f2f;border-radius:8px}
.msg{background:#222;margin:5px;padding:8px;border-radius:8px}
.bottom{position:fixed;bottom:0;width:100%;display:flex;padding:10px;background:#111}
.bottom input{flex:1}
.badge{background:gold;color:#000;padding:3px 6px;border-radius:6px;margin:2px;font-size:12px}
.panel{position:fixed;right:10px;top:60px;background:#222;padding:10px;border-radius:10px;width:220px}
.tab{display:flex;gap:5px}
.tab button{flex:1}
.small{font-size:12px;color:#aaa}
</style>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>

<body>

<div id="auth" class="center">
  <div class="card">
    <h2>IT CHAT ULTIMATE</h2>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<div id="home" class="hidden">

<div class="top">
  <div>
    <div id="name"></div>
    <div id="badges"></div>
    <div id="info" class="small"></div>
  </div>
  <button onclick="logout()">Logout</button>
</div>

<div style="padding:60px 10px">

  <div class="tab">
    <button onclick="view='rooms';render()">Rooms</button>
    <button onclick="view='friends';render()">Friends</button>
    <button onclick="view='profile';render()">Profile</button>
  </div>

  <div id="content"></div>

</div>

<div id="adminPanel" class="panel hidden">
  <h4>ADMIN</h4>
  <button onclick="deleteRoom()">Delete Room</button>
  <button onclick="banLast()">Ban Last</button>
  <button onclick="clearDM()">Clear DM</button>
</div>

</div>

<div id="chat" class="hidden">

<div class="top">
<button onclick="back()">⬅</button>
<span id="roomTitle"></span>
</div>

<div id="msgs" style="padding-top:60px;padding-bottom:70px"></div>

<div class="bottom">
<input id="msg">
<button onclick="send()">Send</button>
</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCcv6TYBlwM3wdASndMtqncQvJhzztFZ9k",
  authDomain: "uno-i-t.firebaseapp.com",
  databaseURL: "https://uno-i-t-default-rtdb.firebaseio.com",
  projectId: "uno-i-t",
  storageBucket: "uno-i-t.firebasestorage.app",
  messagingSenderId: "735333945529",
  appId: "1:735333945529:web:0de9350fe4d36009224b68",
  measurementId: "G-NFVJZ0L8DF"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let user=null;
let room=null;
let view="rooms";
let lastUser=null;

const ADMIN_EMAIL="admin@it.com";
const ADMIN_PASS="12345678";

function register(){
 auth.createUserWithEmailAndPassword(email.value,pass.value)
 .then(u=>{
  db.ref("users/"+u.user.uid).set({
   name:"User"+Math.floor(Math.random()*9999),
   xp:0,
   badges:["new"],
   friends:{}
  });
 });
}

function login(){
 auth.signInWithEmailAndPassword(email.value,pass.value);
}

auth.onAuthStateChanged(u=>{
 if(u){
  user=u;
  showHome();
  loadUser();
  render();
 } else showAuth();
});

function showAuth(){
 auth.style.display="flex";
 home.classList.add("hidden");
 chat.classList.add("hidden");
}

function showHome(){
 auth.style.display="none";
 home.classList.remove("hidden");

 if(user.email===ADMIN_EMAIL){
  adminPanel.classList.remove("hidden");
 }
}

function loadUser(){
 db.ref("users/"+user.uid).on("value",s=>{
  let d=s.val()||{};
  name.innerText=d.name;
  info.innerText="XP:"+ (d.xp||0);

  badges.innerHTML="";
  (d.badges||[]).forEach(b=>{
   let x=document.createElement("span");
   x.className="badge";
   x.innerText=b;
   badges.appendChild(x);
  });
 });
}

function render(){
 let c=document.getElementById("content");
 c.innerHTML="";

 if(view==="rooms"){
  db.ref("rooms").on("value",s=>{
   c.innerHTML="";
   s.forEach(r=>{
    let d=document.createElement("div");
    d.className="room";
    d.innerText=r.key;
    d.onclick=()=>openRoom(r.key);
    c.appendChild(d);
   });
  });

  let create=document.createElement("button");
  create.innerText="Create Room";
  create.onclick=()=>{
   let n=prompt("Room name");
   db.ref("rooms/"+n).set({by:user.uid});
  };
  c.appendChild(create);
 }

 if(view==="friends"){
  db.ref("users/"+user.uid+"/friends").on("value",s=>{
   c.innerHTML="";
   let data=s.val()||{};
   Object.keys(data).forEach(f=>{
    let d=document.createElement("div");
    d.className="room";
    d.innerText=f;
    d.onclick=()=>openDM(f);
    c.appendChild(d);
   });
  });
 }

 if(view==="profile"){
  c.innerHTML=`
   <div class="room">
    <b>Profile</b><br>
    UID: ${user.uid}<br>
    Email: ${user.email}
   </div>`;
 }
}

function openRoom(r){
 room=r;
 home.classList.add("hidden");
 chat.classList.remove("hidden");
 roomTitle.innerText=r;

 db.ref("messages/"+r).off();
 db.ref("messages/"+r).on("child_added",s=>{
  let m=s.val();
  lastUser=m.uid;

  let d=document.createElement("div");
  d.className="msg";
  d.innerText=m.text;
  msgs.appendChild(d);
 });
}

function openDM(fid){
 room="dm_"+[user.uid,fid].sort().join("_");
 openRoom(room);
}

function send(){
 db.ref("messages/"+room).push({
  text:msg.value,
  uid:user.uid,
  t:Date.now()
 });

 db.ref("users/"+user.uid).once("value",s=>{
  let xp=(s.val().xp||0)+1;
  db.ref("users/"+user.uid).update({xp});
 });

 msg.value="";
}

function deleteRoom(){
 if(user.email===ADMIN_EMAIL){
  db.ref("messages/"+room).remove();
 }
}

function banLast(){
 if(user.email===ADMIN_EMAIL && lastUser){
  db.ref("users/"+lastUser).update({banned:true});
 }
}

function clearDM(){
 db.ref("messages").remove();
}

function back(){
 chat.classList.add("hidden");
 home.classList.remove("hidden");
}

function logout(){auth.signOut();}

</script>

</body>
</html>
