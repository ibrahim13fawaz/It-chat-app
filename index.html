<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IT CHAT PRO</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body{margin:0;background:#070812;color:#fff;font-family:Arial}
button{cursor:pointer}
input{outline:none}
*{box-sizing:border-box}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

// ───────────────── FIREBASE ─────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCcv6TYBlwM3wdASndMtqncQvJhzztFZ9k",
  authDomain: "uno-i-t.firebaseapp.com",
  databaseURL: "https://uno-i-t-default-rtdb.firebaseio.com",
  projectId: "uno-i-t",
  storageBucket: "uno-i-t.firebasestorage.app",
  messagingSenderId: "735333945529",
  appId: "1:735333945529:web:0de9350fe4d36009224b68",
  measurementId: "G-NFVJZ0L8DF"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

// ───────────────── OWNER ─────────────────
const OWNER_EMAIL="admin@it.com";
const OWNER_PASS="123456";

// ───────────────── APP ─────────────────
const {useState,useEffect} = React;

function App(){

const [user,setUser]=useState(null);
const [room,setRoom]=useState("global");
const [rooms,setRooms]=useState([]);
const [msgs,setMsgs]=useState([]);
const [msg,setMsg]=useState("");
const [tab,setTab]=useState("rooms");
const [friends,setFriends]=useState([]);

const isOwner=user?.email===OWNER_EMAIL;

// ───────── FIREBASE LOAD ─────────
useEffect(()=>{

db.ref("rooms").on("value",s=>{
const d=s.val()||{};
setRooms(Object.keys(d).map(k=>({...d[k],id:k})));
});

db.ref("msgs/"+room).on("value",s=>{
const d=s.val()||{};
setMsgs(Object.values(d));
});

},[room]);

// ───────── LOGIN ─────────
const login=async()=>{
const email=prompt("email");
const pass=prompt("password");

if(email===OWNER_EMAIL && pass===OWNER_PASS){
setUser({name:"OWNER",email,xp:9999,level:100});
return;
}

auth.signInWithEmailAndPassword(email,pass)
.then(res=>{
setUser({
id:res.user.uid,
email,
name:email.split("@")[0],
xp:0,
level:1
});
});
};

// ───────── REGISTER ─────────
const register=async()=>{
const email=prompt("email");
const pass=prompt("password");

auth.createUserWithEmailAndPassword(email,pass)
.then(res=>{
db.ref("users/"+res.user.uid).set({
name:email.split("@")[0],
xp:0,
level:1
});
});
};

// ───────── CREATE ROOM ─────────
const createRoom=()=>{
const name=prompt("اسم الغرفة");
if(!name) return;

const id=db.ref("rooms").push().key;
db.ref("rooms/"+id).set({
name,
owner:user.email,
members:1
});
};

// ───────── SEND MESSAGE ─────────
const send=()=>{
if(!msg) return;

db.ref("msgs/"+room).push({
text:msg,
name:user.name,
time:Date.now()
});

setMsg("");
};

// ───────── UI LOGIN ─────────
if(!user){
return(
<div style={{textAlign:"center",padding:50}}>
<h1>IT CHAT PRO</h1>
<button onClick={login}>دخول</button>
<button onClick={register}>تسجيل</button>
</div>
);
}

// ───────── APP UI ─────────
return(
<div style={{display:"flex",flexDirection:"column",height:"100vh"}}>

{/* HEADER */}
<div style={{padding:10,background:"#111",display:"flex",justifyContent:"space-between"}}>
<div>{user.name}</div>
<div>Lv.{user.level}</div>
</div>

{/* TABS */}
<div style={{display:"flex"}}>
<button onClick={()=>setTab("rooms")}>الغرف</button>
<button onClick={()=>setTab("friends")}>الأصدقاء</button>
<button onClick={()=>setTab("profile")}>حسابي</button>
</div>

{/* CONTENT */}
<div style={{flex:1,overflow:"auto",padding:10}}>

{/* ROOMS */}
{tab==="rooms" && (
<>
<button onClick={createRoom}>+ إنشاء غرفة</button>

<div onClick={()=>setRoom("global")}
style={{padding:10,background:"#222",margin:5}}>
🌍 الغرفة العامة
</div>

{rooms.map(r=>(
<div key={r.id}
onClick={()=>setRoom(r.id)}
style={{padding:10,background:"#1a1a2e",margin:5}}>
🏠 {r.name}
</div>
))}
</>
)}

{/* FRIENDS */}
{tab==="friends" && (
friends.length===0
? <div>لا يوجد أصدقاء</div>
: friends.map(f=>(
<div key={f.id}>{f.name}</div>
))
)}

{/* PROFILE */}
{tab==="profile" && (
<div>
<div>اسم: {user.name}</div>
<div>XP: {user.xp}</div>
<div>Level: {user.level}</div>

{isOwner && <div style={{color:"gold"}}>👑 OWNER</div>}
</div>
)}

{/* CHAT */}
{tab==="rooms" && (
<>
<div style={{marginTop:10}}>
{msgs.map((m,i)=>(
<div key={i} style={{background:"#111",margin:5,padding:8}}>
<b>{m.name}:</b> {m.text}
</div>
))}
</div>
</>
)}

</div>

{/* INPUT */}
<div style={{display:"flex",padding:10,background:"#111"}}>
<input
value={msg}
onChange={e=>setMsg(e.target.value)}
style={{flex:1,padding:10}}
/>
<button onClick={send}>إرسال</button>
</div>

</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
